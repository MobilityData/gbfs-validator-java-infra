# Deploys the GBFS Validator API to the DEV environment.
name: Deploy GBFS Validator - DEV

on:
  workflow_dispatch:

jobs:
  gbfs-validator-deployment:
    uses: ./.github/workflows/gbfs-validator-deployer.yml
    with:
      ENVIRONMENT: ${{ vars.DEV_GBFS_VALIDATOR_ENVIRONMENT }}
      BUCKET_NAME: ${{ vars.DEV_GBFS_VALIDATOR_TF_STATE_BUCKET }}
      OBJECT_PREFIX: ${{ vars.DEV_GBFS_VALIDATOR_TF_STATE_OBJECT_PREFIX }}
      PROJECT_ID: ${{ vars.DEV_GBFS_VALIDATOR_PROJECT_ID }}
      REGION: ${{ vars.GBFS_VALIDATOR_REGION }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ vars.DEV_GBFS_VALIDATOR_DEPLOYER_SA }}
      GBFS_API_IMAGE_VERSION: ${{ github.sha }}
      TF_APPLY: true
    secrets:
      GCP_GBFS_VALIDATOR_SA_KEY: ${{ secrets.DEV_GCP_GBFS_VALIDATOR_SA_KEY }}
