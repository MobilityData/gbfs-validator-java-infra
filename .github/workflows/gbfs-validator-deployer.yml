# Reusable workflow: builds the Docker image and deploys via Terraform.
# Called by gbfs-validator-staging.yml and gbfs-validator-prod.yml.
name: GBFS Validator Terraform Deployment

on:
  workflow_call:
    secrets:
      GCP_GBFS_VALIDATOR_SA_KEY:
        description: GCP service account JSON key for deployment
        required: true
    inputs:
      ENVIRONMENT:
        description: Deployment environment (dev, qa, prod, or custom name)
        required: true
        type: string
      BUCKET_NAME:
        description: Full GCS bucket name for Terraform remote state
        required: true
        type: string
      PROJECT_ID:
        description: GCP project ID
        required: true
        type: string
      REGION:
        description: GCP region
        required: true
        type: string
      DEPLOYER_SERVICE_ACCOUNT:
        description: Service account email used by Terraform for impersonation
        required: true
        type: string
      GBFS_API_IMAGE_VERSION:
        description: Docker image version tag to build and deploy (empty = latest from Maven Central)
        required: false
        type: string
        default: ''
      TF_APPLY:
        description: Whether to apply Terraform changes (set false to plan-only)
        required: true
        type: boolean

jobs:
  docker-build-publish:
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      resolved_version: ${{ steps.download_jar.outputs.resolved_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_GBFS_VALIDATOR_SA_KEY }}

      - name: GCloud Setup
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Google Artifact Registry
        # CI/CD: Use _json_key (not _json_key_base64) because the secret stores raw JSON,
        # not base64-encoded JSON. Using the wrong type causes a silent auth failure.
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_GBFS_VALIDATOR_SA_KEY }}

      - name: Download validator JAR from Maven Central
        id: download_jar
        # Downloads the fat JAR. If GBFS_API_IMAGE_VERSION is empty, resolves the
        # latest release from Maven Central. The resolved version is captured as an
        # output so subsequent steps can use it as the Docker image tag.
        run: |
          VERSION_FLAG=""
          if [[ -n "${{ inputs.GBFS_API_IMAGE_VERSION }}" ]]; then
            VERSION_FLAG="-version ${{ inputs.GBFS_API_IMAGE_VERSION }}"
          fi
          OUTPUT=$(scripts/download-validator-jar.sh $VERSION_FLAG)
          echo "$OUTPUT"
          RESOLVED=$(echo "$OUTPUT" | grep '^RESOLVED_VERSION=' | cut -d= -f2)
          echo "resolved_version=${RESOLVED}" >> "$GITHUB_OUTPUT"

      - name: Build & Push Docker Image
        # CI/CD: -environment must be passed so the image is pushed to the correct
        # Artifact Registry repo (gbfs-validator-{env}). Terraform resolves the image
        # from that same repo, so a mismatch would cause Cloud Run deployment to fail.
        run: |
          scripts/docker-build-validator.sh \
            --push \
            -project_id ${{ inputs.PROJECT_ID }} \
            -region ${{ inputs.REGION }} \
            -environment ${{ inputs.ENVIRONMENT }} \
            -version ${{ steps.download_jar.outputs.resolved_version }}

  terraform-deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    needs: docker-build-publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_GBFS_VALIDATOR_SA_KEY }}

      - name: GCloud Setup
        uses: google-github-actions/setup-gcloud@v2

      - name: Set Variables
        # CI/CD: Workflow inputs are not directly available as env vars in subsequent
        # run steps, so we explicitly export them here for replace-variables.sh to consume.
        run: |
          echo "BUCKET_NAME=${{ inputs.BUCKET_NAME }}" >> $GITHUB_ENV
          echo "PROJECT_ID=${{ inputs.PROJECT_ID }}" >> $GITHUB_ENV
          echo "REGION=${{ inputs.REGION }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ inputs.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "DEPLOYER_SERVICE_ACCOUNT=${{ inputs.DEPLOYER_SERVICE_ACCOUNT }}" >> $GITHUB_ENV
          echo "GBFS_API_IMAGE_VERSION=${{ needs.docker-build-publish.outputs.resolved_version }}" >> $GITHUB_ENV

      - name: Populate Terraform Variables
        # CI/CD: Generates infra/backend.conf and infra/vars.tfvars from the *.rename_me
        # templates by substituting {{VARIABLE}} placeholders with environment variable
        # values. Both generated files are git-ignored and created fresh on every run.
        # ENVIRONMENT is used both as a Terraform variable and as the state prefix
        # (e.g. dev/terraform/state), keeping each environment's state isolated.
        run: |
          scripts/replace-variables.sh \
            -in_file infra/backend.conf.rename_me \
            -out_file infra/backend.conf \
            -no_quotes \
            -variables BUCKET_NAME,ENVIRONMENT
          scripts/replace-variables.sh \
            -in_file infra/vars.tfvars.rename_me \
            -out_file infra/vars.tfvars \
            -variables PROJECT_ID,REGION,ENVIRONMENT,DEPLOYER_SERVICE_ACCOUNT,GBFS_API_IMAGE_VERSION

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.3
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend-config=backend.conf

      - name: Terraform Plan
        run: |
          cd infra
          terraform plan -var-file=vars.tfvars -out=tf.plan
          terraform show -no-color tf.plan > terraform-plan.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Persist Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan.txt
          path: infra/terraform-plan.txt
          overwrite: true

      - name: Terraform Apply
        if: ${{ inputs.TF_APPLY }}
        run: |
          cd infra
          terraform apply -auto-approve tf.plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
