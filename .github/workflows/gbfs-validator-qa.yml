# Deploys the GBFS Validator API to the QA environment.
name: Deploy GBFS Validator - QA

on:
  workflow_dispatch:
  workflow_call:
    # CI/CD: The secret is declared here so callers invoking this workflow via
    # workflow_call know what to pass. GitHub does not automatically forward repo
    # secrets to called workflows — the caller must explicitly supply this secret.
    # The job then remaps it to GCP_GBFS_VALIDATOR_SA_KEY when calling the deployer.
    secrets:
      QA_GCP_GBFS_VALIDATOR_SA_KEY:
        required: true

jobs:
  gbfs-validator-deployment:
    uses: ./.github/workflows/gbfs-validator-deployer.yml
    with:
      ENVIRONMENT: ${{ vars.QA_GBFS_VALIDATOR_ENVIRONMENT }}
      BUCKET_NAME: ${{ vars.QA_GBFS_VALIDATOR_TF_STATE_BUCKET }}
      OBJECT_PREFIX: ${{ vars.QA_GBFS_VALIDATOR_TF_STATE_OBJECT_PREFIX }}
      PROJECT_ID: ${{ vars.QA_GBFS_VALIDATOR_PROJECT_ID }}
      REGION: ${{ vars.GBFS_VALIDATOR_REGION }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ vars.QA_GBFS_VALIDATOR_DEPLOYER_SA }}
      GBFS_API_IMAGE_VERSION: ${{ github.sha }}
      TF_APPLY: true
    secrets:
      GCP_GBFS_VALIDATOR_SA_KEY: ${{ secrets.QA_GCP_GBFS_VALIDATOR_SA_KEY }}
